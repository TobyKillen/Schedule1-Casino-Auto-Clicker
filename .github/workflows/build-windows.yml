name: Build Windows executable

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Schedule1AutoClicker.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Check Python source
        run: python -m compileall -q autoclicker.py global_logger.py

      - name: Build executable
        run: >-
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name Schedule1AutoClicker
          --add-data "assets/schedule1_logo.png;assets"
          autoclicker.py

      - name: Smoke-test packaged application
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist\Schedule1AutoClicker.exe" -ArgumentList "--smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged smoke test failed with exit code $($process.ExitCode)"
          }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v7
        with:
          name: Schedule1AutoClicker-windows
          path: dist/Schedule1AutoClicker.exe
          if-no-files-found: error
          retention-days: 14

      - name: Package versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $releaseDirectory = "release"
          $zipName = "Schedule1AutoClicker-$version-windows-x64.zip"

          New-Item -ItemType Directory -Path $releaseDirectory -Force | Out-Null
          Copy-Item "dist\Schedule1AutoClicker.exe" "$releaseDirectory\Schedule1AutoClicker.exe"
          Compress-Archive -Path "dist\Schedule1AutoClicker.exe" -DestinationPath "$releaseDirectory\$zipName" -Force

          $hash = (Get-FileHash "dist\Schedule1AutoClicker.exe" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  Schedule1AutoClicker.exe" | Set-Content "$releaseDirectory\SHA256SUMS.txt" -Encoding ascii

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          $zipName = "Schedule1AutoClicker-$env:VERSION-windows-x64.zip"
          gh release view $env:VERSION --json tagName 2>$null | Out-Null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:VERSION `
              "release\Schedule1AutoClicker.exe" `
              "release\$zipName" `
              "release\SHA256SUMS.txt" `
              --clobber
          }
          else {
            gh release create $env:VERSION `
              "release\Schedule1AutoClicker.exe#Standalone Windows executable" `
              "release\$zipName#Windows x64 package" `
              "release\SHA256SUMS.txt#SHA-256 checksums" `
              --verify-tag `
              --generate-notes `
              --title "Schedule 1 Auto Clicker $env:VERSION"
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publishing failed with exit code $LASTEXITCODE"
          }
