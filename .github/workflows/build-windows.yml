name: Build Windows executable

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Schedule1AutoClicker.exe
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install build dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Check Python source
        run: python -m compileall -q autoclicker.py global_logger.py

      - name: Build executable
        run: >-
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name Schedule1AutoClicker
          --add-data "assets/schedule1_logo.png;assets"
          autoclicker.py

      - name: Smoke-test packaged application
        shell: pwsh
        run: |
          $process = Start-Process -FilePath "dist\Schedule1AutoClicker.exe" -ArgumentList "--smoke-test" -Wait -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Packaged smoke test failed with exit code $($process.ExitCode)"
          }

      - name: Upload Windows executable
        uses: actions/upload-artifact@v7
        with:
          name: Schedule1AutoClicker-windows
          path: dist/Schedule1AutoClicker.exe
          if-no-files-found: error
          retention-days: 14
